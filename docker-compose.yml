services:
  app:
    build: .
    image: db-stat:local
    container_name: db-stat
    ports:
      - "8000:8000"
    environment:
      DB_ENGINE: sqlite
      SQLITE_NAME: /app/db.sqlite3
      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    container_name: db-stat-postgres
    environment:
      POSTGRES_DB: db_statistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_statistics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
