{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DB Monitor{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'home' %}">DB Monitor</a>
    <nav class="nav"><a href="{% url 'home' %}">Подключения</a></nav>
  </header>

  <main class="page-shell">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}<div class="message {{ message.tags }}">{{ message }}</div>{% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <span>Внешняя инспекция PostgreSQL и Greenplum</span>
    <span>HTMX · Django</span>
  </footer>
</body>
</html>
