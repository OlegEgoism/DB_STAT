    <!-- PAGE: CLUSTER HEALTH -->
    <!-- ============================================================ -->
    <div class="page" id="page-cluster-health">
        <div class="row g-3">
            <div class="col-lg-4">
                <div class="glass-card">
                    <div class="card-header"><span><i class="fas fa-heartbeat"></i> Общее состояние</span></div>
                    <div class="card-body text-center">
                        <div class="health-chart-wrap">
                            <canvas id="healthGaugeChart"></canvas>
                        </div>
                        <h3 class="mt-3 text-accent-green">98.7%</h3>
                        <p class="text-muted health-summary-text">Здоровье кластера</p>
                        <div class="row mt-3 health-summary-text">
                            <div class="col-6"><span class="text-accent-green">●</span> Работает: <strong>12</strong></div>
                            <div class="col-6"><span class="text-accent-red">●</span> Не работает: <strong>0</strong></div>
                            <div class="col-6"><span class="text-accent-cyan">●</span> Синхр.: <strong>12</strong></div>
                            <div class="col-6"><span class="text-accent-yellow">●</span> Не синхр.: <strong>0</strong></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="card-header"><span><i class="fas fa-chart-bar"></i> Метрики сегментов</span></div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="healthMetricsChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
