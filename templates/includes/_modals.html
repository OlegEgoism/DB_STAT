{% load static %}
<!-- ========== CONNECTION MODAL ========== -->
<div class="modal fade" id="connectionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered connection-modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="connectionModalTitle"><i class="fas fa-plug me-2 text-accent-blue"></i>Новое подключение</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="connectionForm">
                    <input type="hidden" id="connId">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Название <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="connName" placeholder="Например: Production GP" value="New Connection">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Хост <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="connHost" placeholder="localhost" value="localhost">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Порт <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="connPort" placeholder="5432" value="5432">
                        </div>
                        <div class="col-12">
                            <label class="form-label">База данных <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="connDatabase" placeholder="postgres" value="postgres">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Пользователь <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="connUser" placeholder="postgres" value="postgres">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Тип БД <span class="text-danger">*</span></label>
                            <div class="db-type-select">
                                <select class="visually-hidden" id="connDbType" aria-hidden="true" tabindex="-1">
                                    <option value="PostgreSQL" data-icon="{% static 'img/postgresql-icon.svg' %}">PostgreSQL</option>
                                    <option value="Greenplum" data-icon="{% static 'img/greenplum-icon.svg' %}">Greenplum</option>
                                </select>
                                <button
                                    class="db-type-select__toggle"
                                    id="connDbTypeToggle"
                                    type="button"
                                    aria-haspopup="listbox"
                                    aria-expanded="false"
                                >
                                    <span class="db-type-select__value">
                                        <img
                                            id="connDbTypeIcon"
                                            class="db-type-select__icon"
                                            src="{% static 'img/postgresql-icon.svg' %}"
                                            alt=""
                                        >
                                        <span id="connDbTypeLabel">PostgreSQL</span>
                                    </span>
                                    <i class="fas fa-chevron-down db-type-select__chevron" aria-hidden="true"></i>
                                </button>
                                <div class="db-type-select__menu" id="connDbTypeMenu" role="listbox" aria-label="Тип БД">
                                    <button class="db-type-select__option is-selected" type="button" role="option" aria-selected="true" data-value="PostgreSQL" data-icon="{% static 'img/postgresql-icon.svg' %}">
                                        <img class="db-type-select__option-icon" src="{% static 'img/postgresql-icon.svg' %}" alt="">
                                        <span>PostgreSQL</span>
                                    </button>
                                    <button class="db-type-select__option" type="button" role="option" aria-selected="false" data-value="Greenplum" data-icon="{% static 'img/greenplum-icon.svg' %}">
                                        <img class="db-type-select__option-icon" src="{% static 'img/greenplum-icon.svg' %}" alt="">
                                        <span>Greenplum</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" id="connPassword" placeholder="••••••••">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer connection-modal-footer">
                <div class="connection-modal-footer__danger">
                    <button type="button" class="btn btn-danger d-none" id="connectionDeleteBtn" onclick="deleteConnection()">Удалить</button>
                </div>
                <div class="connection-modal-footer__actions">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" class="btn btn-outline-secondary" onclick="testNewConnection()">Проверить</button>
                    <button type="button" class="btn btn-primary" onclick="saveConnection()"><span id="connectionSaveText">Подключиться</span></button>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- ========== SIDEBAR SETTINGS MODAL ========== -->
<div class="modal fade" id="sidebarSettingsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered sidebar-settings-modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-cog me-2 text-accent-blue"></i>Настройки сайдбара</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="sidebar-settings-help">Выберите вкладки, которые нужно показывать в боковом меню для текущего пользователя.</p>
                <div class="sidebar-settings-list" id="sidebarSettingsList"></div>
                <hr>
                <p class="sidebar-settings-help">Выберите действия DBAudit, которые будут доступны в фильтре вкладки «Аудит».</p>
                <div class="sidebar-settings-list" id="auditActionsSettingsList"></div>
            </div>
            <div class="modal-footer sidebar-settings-footer">
                <button type="button" class="btn btn-outline-secondary" id="sidebarSettingsSelectAllBtn">Выбрать все</button>
                <button type="button" class="btn btn-primary" id="sidebarSettingsSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<!-- ========== TOAST ========== -->
<div class="toast-container">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastMessage">Уведомление</div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
