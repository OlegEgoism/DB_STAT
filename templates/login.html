{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | GP Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/home.css' %}" rel="stylesheet">
</head>
<body>
{% include 'includes/_background.html' %}
<div class="login-page">
    <div class="login-card glass-card">
        <div class="login-brand">
            <div class="logo-icon"><i class="fas fa-database"></i></div>
            <div>
                <h1>GP Monitor</h1>
                <p>Авторизация пользователя</p>
            </div>
        </div>
        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label" for="loginInput">Login</label>
                <input class="form-control" id="loginInput" name="login" value="{{ login_value }}" autocomplete="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="emailInput">Email</label>
                <input class="form-control" id="emailInput" name="email" type="email" value="{{ email_value }}" autocomplete="email" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
    </div>
</div>
</body>
</html>
