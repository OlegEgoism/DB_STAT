{% extends 'base.html' %}
{% load static %}

{% block title %}Авторизация | GP STAT{% endblock %}

{% block content %}
{% include 'includes/_background.html' %}
<div class="login-page app-page-shell">
    <div class="login-card glass-card">
        <div class="login-brand">
            <div class="logo-icon"><img src="{% static 'img/db-stat-icon.svg' %}" alt="DB STAT"></div>
            <div>
                <h1>GP Monitor</h1>
                <p>Авторизация пользователя</p>
            </div>
        </div>
        {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}
        <form method="post" novalidate>
            {% csrf_token %}
            <div class="form-field">
                <label class="form-label" for="loginInput">Логин/Login</label>
                <input class="form-control" id="loginInput" name="login" value="{{ login_value }}" autocomplete="username" required>
            </div>
            <div class="form-field">
                <label class="form-label" for="emailInput">Почта/Email</label>
                <input class="form-control" id="emailInput" name="email" type="email" value="{{ email_value }}" autocomplete="email" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
